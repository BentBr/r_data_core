<div>
    <div class="d-flex align-center justify-space-between pa-4">
        <h3 class="text-h6">
            {{ t('permissions.page.users.title') || 'Users' }}
        </h3>
        <v-btn
            v-if="canCreateUser"
            color="primary"
            data-testid="users-create-btn"
            @click="openCreateUserDialog"
        >
            <template #prepend>
                <SmartIcon
                    icon="plus"
                    size="sm"
                />
            </template>
            {{ t('permissions.page.users.new_button') || 'New User' }}
        </v-btn>
    </div>
    <PaginatedDataTable
        data-testid="users-table"
        :items="users"
        :headers="userTableHeaders"
        :loading="usersLoading"
        :error="usersError"
        :loading-text="t('permissions.page.users.loading')"
        :current-page="usersCurrentPage"
        :items-per-page="usersItemsPerPage"
        :total-items="usersTotalItems"
        :total-pages="usersTotalPages"
        :has-next="usersPaginationMeta?.has_next"
        :has-previous="usersPaginationMeta?.has_previous"
        @update:page="handleUsersPageChange"
        @update:items-per-page="handleUsersItemsPerPageChange"
        @update:sort="handleUsersSortChange"
    >
        <!-- Username Column -->
        <template #item.username="{ item }">
            <div class="d-flex align-center">
                <SmartIcon
                    v-if="item.super_admin"
                    icon="shield-check"
                    color="warning"
                    size="sm"
                    class="mr-2"
                />
                <span>{{ item.username }}</span>
            </div>
        </template>

        <!-- Email Column -->
        <template #item.email="{ item }">
            <span>{{ item.email }}</span>
        </template>

        <!-- Roles Column -->
        <template #item.roles="{ item }">
            <div class="d-flex gap-1 flex-wrap">
                <Badge
                    v-for="roleName in getRoleNamesForUser(item)"
                    :key="roleName"
                    size="small"
                    color="primary"
                    variant="outlined"
                >
                    {{ roleName }}
                </Badge>
                <span
                    v-if="getRoleNamesForUser(item).length === 0"
                    class="text-body-2 text-medium-emphasis"
                >
                    {{ t('permissions.page.users.no_roles') || 'No roles' }}
                </span>
            </div>
        </template>

        <!-- Status Column -->
        <template #item.is_active="{ item }">
            <Badge
                size="small"
                :status="item.is_active ? 'success' : 'error'"
            >
                {{
                    item.is_active
                        ? t('permissions.page.users.status.active')
                        : t('permissions.page.users.status.inactive')
                }}
            </Badge>
        </template>

        <!-- Actions Column -->
        <template #item.actions="{ item }">
            <div class="d-flex gap-2">
                <v-btn
                    variant="text"
                    size="small"
                    color="info"
                    @click="openEditUserDialog(item)"
                >
                    <SmartIcon
                        icon="pencil"
                        size="sm"
                    />
                </v-btn>
                <v-btn
                    variant="text"
                    size="small"
                    color="error"
                    :disabled="!item.is_active"
                    @click="confirmDeleteUser(item)"
                >
                    <SmartIcon
                        icon="trash-2"
                        size="sm"
                    />
                </v-btn>
            </div>
        </template>

        <!-- Created At Column -->
        <template #item.created_at="{ item }">
            <span>{{ formatDate(item.created_at) }}</span>
        </template>
    </PaginatedDataTable>

    <!-- User Form Dialog -->
    <UserDialog
        v-model="showUserDialog"
        :user="editingUser"
        :loading="savingUser"
        @save="handleSaveUser"
    />

    <!-- Delete Confirmation Dialog -->
    <ConfirmationDialog
        v-model="showDeleteUserDialog"
        :title="deleteUserDialogConfig.title"
        :confirm-text="deleteUserDialogConfig.confirmText"
        :cancel-text="deleteUserDialogConfig.cancelText"
        :loading="deletingUser"
        color="error"
        @confirm="deleteUser"
    >
        <p v-if="userToDelete">
            {{
                t('permissions.page.users.delete.message', { name: userToDelete.username }) ||
                `Are you sure you want to delete user ${userToDelete.username}?`
            }}
        </p>
    </ConfirmationDialog>
</div>
