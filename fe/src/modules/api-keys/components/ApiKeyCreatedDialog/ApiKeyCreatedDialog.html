<v-dialog
    :model-value="modelValue"
    :max-width="getDialogMaxWidth('default')"
    persistent
    @update:model-value="$emit('update:modelValue', $event)"
>
    <v-card>
        <v-card-title class="d-flex align-center pa-6">
            <SmartIcon
                icon="check-circle"
                color="success"
                size="md"
                class="mr-2"
            />
            {{ t('api_keys.created.title') }}
        </v-card-title>
        <v-card-text class="pa-6">
            <v-alert
                type="warning"
                variant="tonal"
                class="mb-4"
            >
                {{ t('api_keys.created.warning') }}
            </v-alert>

            <v-text-field
                id="apiKey"
                :model-value="apiKey"
                :label="t('api_keys.created.key_label')"
                readonly
                variant="outlined"
                class="mb-4"
            >
                <template #append>
                    <v-btn
                        variant="text"
                        size="small"
                        @click="copyApiKey"
                    >
                        <SmartIcon
                            icon="copy"
                            size="sm"
                        />
                    </v-btn>
                </template>
            </v-text-field>

            <p class="text-body-2 text-medium-emphasis">
                {{ t('api_keys.created.description') }}
            </p>
        </v-card-text>
        <v-card-actions class="pa-4 px-6">
            <v-spacer />
            <v-btn
                color="primary"
                variant="flat"
                @click="$emit('update:modelValue', false)"
            >
                {{ t('common.close') }}
            </v-btn>
        </v-card-actions>
    </v-card>
</v-dialog>
