<div>
    <PageLayout>
        <template #actions>
            <v-btn
                v-if="canCreateApiKey"
                color="primary"
                variant="flat"
                data-testid="api-keys-create-btn"
                @click="showCreateDialog = true"
            >
                <template #prepend>
                    <SmartIcon
                        icon="key"
                        size="sm"
                    />
                </template>
                {{ t('api_keys.create.button') }}
            </v-btn>
        </template>
        <PaginatedDataTable
            data-testid="api-keys-table"
            :items="apiKeys"
            :headers="tableHeaders"
            :loading="loading"
            :error="error"
            :loading-text="t('table.loading')"
            :current-page="currentPage"
            :items-per-page="itemsPerPage"
            :total-items="totalItems"
            :total-pages="totalPages"
            :has-next="paginationMeta?.has_next"
            :has-previous="paginationMeta?.has_previous"
            @update:page="handlePageChange"
            @update:items-per-page="handleItemsPerPageChange"
            @update:sort="handleSortChange"
        >
            <!-- Name Column -->
            <template #item.name="{ item }">
                <div class="d-flex align-center">
                    <SmartIcon
                        :icon="item.is_active ? 'key' : 'key-round'"
                        :color="item.is_active ? 'success' : 'error'"
                        size="sm"
                        class="mr-2"
                    />
                    <span :class="{ 'text-decoration-line-through': !item.is_active }">
                        {{ item.name }}
                    </span>
                </div>
            </template>

            <!-- Description Column -->
            <template #item.description="{ item }">
                <span class="text-body-2 text-medium-emphasis">
                    {{ item.description ?? 'No description' }}
                </span>
            </template>

            <!-- Status Column -->
            <template #item.is_active="{ item }">
                <Badge
                    :status="item.is_active ? 'success' : 'error'"
                    size="small"
                >
                    {{ item.is_active ? 'Active' : 'Inactive' }}
                </Badge>
            </template>

            <!-- Created At Column -->
            <template #item.created_at="{ item }">
                <span class="text-body-2">
                    {{ formatDate(item.created_at) }}
                </span>
            </template>

            <!-- Expires At Column -->
            <template #item.expires_at="{ item }">
                <span
                    v-if="item.expires_at"
                    class="text-body-2"
                >
                    {{ formatDate(item.expires_at) }}
                </span>
                <span
                    v-else
                    class="text-body-2 text-medium-emphasis"
                >
                    Never
                </span>
            </template>

            <!-- Last Used Column -->
            <template #item.last_used_at="{ item }">
                <span
                    v-if="item.last_used_at"
                    class="text-body-2"
                >
                    {{ formatDate(item.last_used_at) }}
                </span>
                <span
                    v-else
                    class="text-body-2 text-medium-emphasis"
                >
                    Never
                </span>
            </template>

            <!-- User UUID Column (Admin Only) -->
            <template #item.user_uuid="{ item }">
                <span
                    v-if="isAdmin"
                    class="text-body-2 font-mono"
                >
                    {{ item.user_uuid }}
                </span>
                <span
                    v-else
                    class="text-body-2 text-medium-emphasis"
                >
                    -
                </span>
            </template>

            <!-- Created By Column (Admin Only) -->
            <template #item.created_by="{ item }">
                <span
                    v-if="isAdmin"
                    class="text-body-2 font-mono"
                >
                    {{ item.created_by }}
                </span>
                <span
                    v-else
                    class="text-body-2 text-medium-emphasis"
                >
                    -
                </span>
            </template>

            <!-- Actions Column -->
            <template #item.actions="{ item }">
                <div class="d-flex gap-2">
                    <v-btn
                        variant="text"
                        size="small"
                        color="info"
                        :disabled="!item.is_active"
                        @click="viewKey(item)"
                    >
                        <SmartIcon
                            icon="eye"
                            size="sm"
                        />
                    </v-btn>
                    <v-btn
                        variant="text"
                        size="small"
                        color="error"
                        :disabled="!item.is_active"
                        @click="confirmRevoke(item)"
                    >
                        <SmartIcon
                            icon="trash-2"
                            size="sm"
                        />
                    </v-btn>
                </div>
            </template>
        </PaginatedDataTable>

        <!-- Dialogs -->
        <ApiKeyCreateDialog
            v-model="showCreateDialog"
            :loading="creating"
            @create="createApiKey"
        />

        <ApiKeyViewDialog
            v-model="showViewDialog"
            :api-key="selectedKey"
        />

        <ApiKeyCreatedDialog
            v-model="showCreatedKeyDialog"
            :api-key="createdApiKey"
            @copy-success="handleCopySuccess"
        />

        <!-- Use DialogManager for revoke confirmation -->
        <DialogManager
            v-model="showRevokeDialog"
            :config="revokeDialogConfig"
            :loading="revoking"
            @confirm="revokeApiKey"
        >
            <p>{{ t('api_keys.revoke.message', { name: keyToRevoke?.name ?? 'Unknown' }) }}</p>
        </DialogManager>

        <!-- Snackbar -->
        <SnackbarManager :snackbar="currentSnackbar" />
    </PageLayout>
</div>
