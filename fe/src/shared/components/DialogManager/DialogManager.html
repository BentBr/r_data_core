<v-dialog
    v-model="showDialog"
    :max-width="computedMaxWidth"
    :persistent="dialogConfig.persistent ?? false"
>
    <v-card>
        <v-card-title class="text-h5 pa-6">
            {{ dialogConfig.title }}
        </v-card-title>
        <v-card-text class="pa-6">
            <slot />
        </v-card-text>
        <v-card-actions class="pa-4 px-6">
            <v-spacer />
            <v-btn
                :variant="buttonConfigs.text.variant"
                color="mutedForeground"
                @click="closeDialog"
            >
                {{ cancelText }}
            </v-btn>
            <v-btn
                v-if="showConfirmButton"
                :color="buttonConfigs.primary.color"
                :variant="buttonConfigs.primary.variant"
                :loading="loading"
                :disabled="disabled"
                @click="confirmAction"
            >
                {{ confirmText }}
            </v-btn>
        </v-card-actions>
    </v-card>
</v-dialog>
