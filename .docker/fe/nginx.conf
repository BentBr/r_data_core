server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Entry point must never be cached: it references the content-hashed
    # assets, so it has to be revalidated on every load for new deploys to be
    # picked up. Exact-match locations take precedence over the regex below.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # Runtime config is regenerated at container start and keeps a stable name,
    # so it must not be cached as an immutable asset.
    location = /config.js {
        add_header Cache-Control "no-cache" always;
    }

    # Cache static assets — filenames are content-hashed, so caching forever is
    # safe: a new build produces new filenames that bypass the cache.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }
}
