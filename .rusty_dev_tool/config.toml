local_key = "rdatacore"
# Just using it for aliases
no_docker_compose = true

[commands]
    [commands.test]
        "alias" = "test"
        "execution" = "RUST_LOG=error cargo test --workspace"
        "description" = "Runs all tests sequentially (as we need to have it for integration tests. Needs the test database"
    [commands.test-unit]
        "alias" = "test-unit"
        "execution" = "RUST_LOG=warning cargo test --lib -p r_data_core && RUST_LOG=warning cargo test --test hash_passwords"
        "description" = "Runs all unit tests"
    [commands.test-fe]
        "alias" = "test-fe"
        "execution" = "docker compose exec node npm run test"
        "description" = "Runs vitest for FE testing"
    [commands.clippy]
        "alias" = "clippy"
        "execution" = " cargo +nightly clippy --workspace --all-targets --all-features -- -D clippy::all -D warnings -D clippy::pedantic -D clippy::nursery "
        "description" = "Runs clippy with all lints enabled"
    [commands.lint]
        "alias" = "lint"
        "execution" = "docker compose exec node npm run lint"
        "description" = "Runs ESLint (with prettier) and fixes it's findings"
    [commands.test-e2e]
        "alias" = "test-e2e"
        "execution" = "docker compose --profile e2e up -d && sleep 3 && docker compose --profile e2e exec playwright sh -c 'npm install && npx playwright test --config=e2e/playwright.config.ts'"
        "description" = "Runs Playwright E2E browser tests"
    [commands.test-e2e-report]
        "alias" = "test-e2e-report"
        "execution" = "docker compose --profile e2e exec playwright npx playwright show-report e2e/playwright-report --host 0.0.0.0 --port 9323"
        "description" = "Serves Playwright report at http://playwright.rdatacore.docker"
    [commands.clean-e2e]
        "alias" = "clean-e2e"
        "execution" = "docker compose exec -T postgres psql -U postgres -d rdata -f /dev/stdin < .scripts/clean-e2e.sql"
        "description" = "Removes all E2E test data (e2e_* users, keys, roles, workflows, entity definitions, and dynamic tables) from the local database"
    [commands.generate-ts]
        "alias" = "generate-ts"
        "execution" = "TS_RS_EXPORT_DIR=$(pwd)/fe/src/types/generated cargo test --workspace export_bindings 2>&1 && cargo run -p r_data_core_core --bin export_validation_constants > ./fe/src/types/generated/validation.ts"
        "description" = "Generates TypeScript type bindings and validation constants from Rust structs"
    [commands.generate-ts-check]
        "alias" = "generate-ts-check"
        "execution" = "TS_RS_EXPORT_DIR=$(pwd)/fe/src/types/generated cargo test --workspace export_bindings 2>&1 && cargo run -p r_data_core_core --bin export_validation_constants > ./fe/src/types/generated/validation.ts && git diff --exit-code fe/src/types/generated/"
        "description" = "Generates TS bindings and fails if any generated files differ from committed versions"
# Mandatory node
[environments]
