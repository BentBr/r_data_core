name: 'Sync labels'

# Maintains the commit-type label set (name/colour/description) used by
# pr-management.yml. Idempotent: creates missing labels, updates drifted ones,
# and leaves unrelated labels untouched unless hard_reset is requested.

on:
    workflow_dispatch:
        inputs:
            hard_reset:
                description: 'Delete the managed labels first, then recreate'
                type: choice
                options: [ 'false', 'true' ]
                default: 'false'
    schedule:
        -   cron: '0 4 * * 1'

jobs:
    sync-labels:
        name: Sync labels
        runs-on: ubuntu-latest
        permissions:
            issues: write
        env:
            HARD_RESET: ${{ github.event.inputs.hard_reset || 'false' }}
            LABELS_JSON: >
                [
                    {"name":"feat",            "color":"66CDAA","description":"New feature or capability"},
                    {"name":"fix",             "color":"9370DB","description":"Bug fix"},
                    {"name":"docs",            "color":"0075CA","description":"Documentation only"},
                    {"name":"style",           "color":"C5DEF5","description":"Formatting / lint only, no behaviour change"},
                    {"name":"refactor",        "color":"F6CDCF","description":"Refactor, no behaviour change"},
                    {"name":"perf",            "color":"FBCA04","description":"Performance improvement"},
                    {"name":"test",            "color":"BFD4F2","description":"Tests only"},
                    {"name":"build",           "color":"D4C5F9","description":"Build system or dependencies"},
                    {"name":"ci",              "color":"1D76DB","description":"CI/CD configuration"},
                    {"name":"chore",           "color":"CFD3D7","description":"Maintenance"},
                    {"name":"breaking-change", "color":"B60205","description":"Introduces a breaking change"}
                ]
        steps:
            -   name: Upsert managed labels
                uses: actions/github-script@v7
                env:
                    LABELS_JSON: ${{ env.LABELS_JSON }}
                    HARD_RESET: ${{ env.HARD_RESET }}
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    script: |
                        const { owner, repo } = context.repo;
                        const desired = JSON.parse(process.env.LABELS_JSON);
                        const hardReset = (process.env.HARD_RESET || 'false').toLowerCase() === 'true';

                        const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
                            owner, repo, per_page: 100
                        });
                        const byName = new Map(existing.map(l => [l.name.toLowerCase(), l]));
                        const norm = (s) => (s || '').toLowerCase();

                        for (const want of desired) {
                            const cur = byName.get(want.name.toLowerCase());

                            if (hardReset && cur) {
                                try {
                                    await github.rest.issues.deleteLabel({ owner, repo, name: cur.name });
                                } catch (e) {
                                    core.warning(`Delete '${cur.name}' failed: ${e.message}`);
                                }
                            }

                            if (!cur || hardReset) {
                                try {
                                    await github.rest.issues.createLabel({
                                        owner, repo, name: want.name,
                                        color: want.color, description: want.description
                                    });
                                    core.info(`Created '${want.name}'`);
                                } catch (e) {
                                    core.warning(`Create '${want.name}' failed: ${e.message}`);
                                }
                                continue;
                            }

                            const needsUpdate =
                                norm(cur.color) !== norm(want.color) ||
                                (cur.description || '') !== (want.description || '');

                            if (needsUpdate) {
                                try {
                                    await github.rest.issues.updateLabel({
                                        owner, repo, name: cur.name,
                                        color: want.color, description: want.description
                                    });
                                    core.info(`Updated '${want.name}'`);
                                } catch (e) {
                                    core.warning(`Update '${want.name}' failed: ${e.message}`);
                                }
                            }
                        }
