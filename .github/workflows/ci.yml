name: CI

on:
    # Only run on PRs - merges to main/develop already passed CI on the PR
    pull_request:
        branches: [ main, develop ]
    # Allow other workflows to call this one (for release-please PRs)
    workflow_call:
    # Dispatched by pr-management.yml onto an auto-created PR branch. That PR is
    # opened via GITHUB_TOKEN, which (by GitHub's anti-recursion rule) does NOT
    # trigger `pull_request` CI. API `workflow_dispatch` is the documented
    # exception, so CI runs against the PR contents. Caveat: dispatch check runs
    # do NOT surface in the PR merge box (GitHub only associates
    # pull_request/push suites with a PR), so the ci-gate job posts an explicit
    # `ci-gate` commit status on github.sha (= the PR head), which the merge box
    # honors. See the ci-gate job.
    workflow_dispatch:

# statuses: write lets the changes + ci-gate jobs post the `ci-gate` commit
# status on workflow_dispatch runs (auto-PR gating).
permissions:
    contents: read
    statuses: write

jobs:
    # Detect which parts of the codebase changed
    # For workflow_call (release-please), run all checks since we can't detect changes
    changes:
        runs-on: ubuntu-latest
        outputs:
            backend: ${{ steps.filter.outputs.backend || steps.default.outputs.backend }}
            frontend: ${{ steps.filter.outputs.frontend || steps.default.outputs.frontend }}
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
                with:
                    # Fetch enough history for paths-filter to work
                    fetch-depth: 0

            -   name: Detect changes (PR only)
                if: ${{ github.event_name == 'pull_request' }}
                uses: dorny/paths-filter@v3
                id: filter
                with:
                    filters: |
                        backend:
                          - 'crates/**'
                          - 'migrations/**'
                          - 'tests/**'
                          - 'Cargo.toml'
                          - 'Cargo.lock'
                          - '.sqlx/**'
                          - 'src/**'
                        frontend:
                          - 'fe/**'

            # For workflow_call / workflow_dispatch, run all checks (paths-filter
            # can't diff against a base ref outside of pull_request)
            -   name: Default to all checks (non-PR)
                if: ${{ github.event_name != 'pull_request' }}
                id: default
                run: |
                    echo "backend=true" >> $GITHUB_OUTPUT
                    echo "frontend=true" >> $GITHUB_OUTPUT

            # Dispatched runs (auto-PR gating) don't surface in the PR merge box,
            # so flag ci-gate pending immediately; the ci-gate job resolves it.
            -   name: Set ci-gate status to pending (workflow_dispatch)
                if: ${{ github.event_name == 'workflow_dispatch' }}
                env:
                    GH_TOKEN: ${{ github.token }}
                run: |
                    gh api "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
                        -f state=pending -f context=ci-gate \
                        -f description="CI is running" \
                        -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

    # ============================================================================
    # Backend Jobs - Only run when backend files change
    # ============================================================================
    backend-prepare:
        needs: changes
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Install Rust (nightly)
                uses: dtolnay/rust-toolchain@master
                with:
                    toolchain: nightly
                    components: clippy,rustfmt

            -   name: Show rustc version
                run: rustc -Vv

            -   name: Cache cargo registry + build
                uses: swatinem/rust-cache@v2
                with:
                    workspaces: .

            -   name: Cache cargo bin directory
                id: cache-cargo-bin
                uses: actions/cache@v4
                with:
                    path: ~/.cargo/bin
                    key: ${{ runner.os }}-cargo-bin-${{ hashFiles('Cargo.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-cargo-bin-

            -   name: Install cargo-audit
                run: |
                    if ! command -v cargo-audit &> /dev/null; then
                      cargo install cargo-audit --locked
                    fi

            -   name: Install sqlx-cli
                run: |
                    if ! command -v sqlx &> /dev/null; then
                      cargo install sqlx-cli --no-default-features --features postgres --locked
                    fi

    backend-clippy:
        needs: [ changes, backend-prepare ]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Install Rust (nightly)
                uses: dtolnay/rust-toolchain@master
                with:
                    toolchain: nightly
                    components: clippy,rustfmt

            -   name: Cache cargo registry + build
                uses: swatinem/rust-cache@v2
                with:
                    workspaces: .

            -   name: Cache cargo bin directory
                uses: actions/cache@v4
                with:
                    path: ~/.cargo/bin
                    key: ${{ runner.os }}-cargo-bin-${{ hashFiles('Cargo.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-cargo-bin-

            -   name: Clippy (strict)
                env:
                    SQLX_OFFLINE: true
                run: |
                    cargo clippy --workspace --all-targets --all-features -- \
                      -D clippy::all -D warnings -D clippy::pedantic -D clippy::nursery

    backend-format:
        needs: [ changes, backend-prepare ]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Install Rust (nightly)
                uses: dtolnay/rust-toolchain@master
                with:
                    toolchain: nightly
                    components: clippy,rustfmt

            -   name: Cache cargo registry + build
                uses: swatinem/rust-cache@v2
                with:
                    workspaces: .

            -   name: Format check
                env:
                    SQLX_OFFLINE: true
                run: cargo fmt --check --all

    backend-audit:
        needs: [ changes, backend-prepare ]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Install Rust (nightly)
                uses: dtolnay/rust-toolchain@master
                with:
                    toolchain: nightly
                    components: clippy,rustfmt

            -   name: Cache cargo registry + build
                uses: swatinem/rust-cache@v2
                with:
                    workspaces: .

            -   name: Cache cargo bin directory
                uses: actions/cache@v4
                with:
                    path: ~/.cargo/bin
                    key: ${{ runner.os }}-cargo-bin-${{ hashFiles('Cargo.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-cargo-bin-

            -   name: Install cargo-audit
                run: |
                    if ! command -v cargo-audit &> /dev/null; then
                      cargo install cargo-audit --locked
                    fi

            -   name: Security audit
                run: cargo audit

    backend-tests:
        needs: [ changes, backend-prepare ]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        # Note: Using docker run instead of services: block to support workflow_call (reusable workflows)
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Start PostgreSQL
                run: |
                    docker run -d --name postgres \
                      -e POSTGRES_USER=postgres \
                      -e POSTGRES_PASSWORD=postgres \
                      -e POSTGRES_DB=rdata_test \
                      -p 5432:5432 \
                      postgres:18-alpine
                    # Wait for postgres to be ready
                    for i in {1..30}; do
                      docker exec postgres pg_isready -U postgres && break
                      echo "Waiting for postgres..."
                      sleep 1
                    done

            -   name: Start Redis
                run: |
                    docker run -d --name redis \
                      -p 6379:6379 \
                      redis:8-alpine
                    # Wait for redis to be ready
                    for i in {1..30}; do
                      docker exec redis redis-cli ping && break
                      echo "Waiting for redis..."
                      sleep 1
                    done

            -   name: Install Rust (nightly)
                uses: dtolnay/rust-toolchain@master
                with:
                    toolchain: nightly
                    components: clippy,rustfmt

            -   name: Cache cargo registry + build
                uses: swatinem/rust-cache@v2
                with:
                    workspaces: .

            -   name: Cache cargo bin directory
                uses: actions/cache@v4
                with:
                    path: ~/.cargo/bin
                    key: ${{ runner.os }}-cargo-bin-${{ hashFiles('Cargo.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-cargo-bin-

            -   name: Install sqlx-cli
                run: |
                    if ! command -v sqlx &> /dev/null; then
                      cargo install sqlx-cli --no-default-features --features postgres --locked
                    fi

            -   name: Run migrations
                env:
                    DATABASE_URL: postgres://postgres:postgres@localhost:5432/rdata_test
                run: |
                    sqlx migrate run

            -   name: Run tests
                env:
                    DATABASE_URL: postgres://postgres:postgres@localhost:5432/rdata_test
                    REDIS_URL: redis://localhost:6379
                run: RUST_LOG=error cargo test --workspace

    backend-build:
        needs: [ changes, backend-prepare ]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Install Rust (nightly)
                uses: dtolnay/rust-toolchain@master
                with:
                    toolchain: nightly
                    components: clippy,rustfmt

            -   name: Cache cargo registry + build
                uses: swatinem/rust-cache@v2
                with:
                    workspaces: .

            -   name: Build verification
                env:
                    SQLX_OFFLINE: true
                run: cargo build --workspace --all-features

    backend-ts-bindings:
        name: TS bindings up to date
        needs: [ changes, backend-prepare ]
        if: ${{ needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Install Rust (nightly)
                uses: dtolnay/rust-toolchain@master
                with:
                    toolchain: nightly
                    components: clippy,rustfmt

            -   name: Cache cargo registry + build
                uses: swatinem/rust-cache@v2
                with:
                    workspaces: .

            -   name: Generate TS bindings
                env:
                    SQLX_OFFLINE: true
                run: |
                    TS_RS_EXPORT_DIR=${{ github.workspace }}/fe/src/types/generated cargo test --workspace export_bindings 2>&1
                    cargo run -p r_data_core_core --bin export_validation_constants > ./fe/src/types/generated/validation.ts

            -   name: Check for stale bindings
                run: |
                    if ! git diff --exit-code fe/src/types/generated/; then
                      echo "::error::Generated TypeScript bindings are out of date. Run 'rdt generate-ts' locally and commit the changes."
                      exit 1
                    fi

    # ============================================================================
    # Frontend Jobs - Only run when frontend files change
    # ============================================================================
    frontend-prepare:
        needs: changes
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup pnpm
                uses: pnpm/action-setup@v6
                with:
                    version: 10.33.4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: '22'

            -   name: Cache pnpm store
                uses: actions/cache@v4
                with:
                    path: fe/.pnpm-store
                    key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}
                    restore-keys: |
                        ${{ runner.os }}-pnpm-store-

            -   name: Install dependencies
                working-directory: fe
                run: pnpm install --frozen-lockfile

    frontend-lint:
        needs: [ changes, frontend-prepare ]
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup pnpm
                uses: pnpm/action-setup@v6
                with:
                    version: 10.33.4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: '22'

            -   name: Cache pnpm store
                uses: actions/cache@v4
                with:
                    path: fe/.pnpm-store
                    key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}
                    restore-keys: |
                        ${{ runner.os }}-pnpm-store-

            -   name: Install dependencies
                working-directory: fe
                run: pnpm install --frozen-lockfile

            -   name: Lint
                working-directory: fe
                run: pnpm lint

    frontend-tests:
        needs: [ changes, frontend-prepare ]
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup pnpm
                uses: pnpm/action-setup@v6
                with:
                    version: 10.33.4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: '22'

            -   name: Cache pnpm store
                uses: actions/cache@v4
                with:
                    path: fe/.pnpm-store
                    key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}
                    restore-keys: |
                        ${{ runner.os }}-pnpm-store-

            -   name: Install dependencies
                working-directory: fe
                run: pnpm install --frozen-lockfile

            -   name: Run tests
                working-directory: fe
                run: pnpm test

    frontend-audit:
        needs: [ changes, frontend-prepare ]
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup pnpm
                uses: pnpm/action-setup@v6
                with:
                    version: 10.33.4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: '22'

            -   name: Cache pnpm store
                uses: actions/cache@v4
                with:
                    path: fe/.pnpm-store
                    key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}
                    restore-keys: |
                        ${{ runner.os }}-pnpm-store-

            -   name: Install dependencies
                working-directory: fe
                run: pnpm install --frozen-lockfile

            -   name: Security audit
                working-directory: fe
                run: pnpm audit --audit-level moderate

    frontend-build:
        needs: [ changes, frontend-prepare ]
        if: ${{ needs.changes.outputs.frontend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup pnpm
                uses: pnpm/action-setup@v6
                with:
                    version: 10.33.4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: '22'

            -   name: Cache pnpm store
                uses: actions/cache@v4
                with:
                    path: fe/.pnpm-store
                    key: ${{ runner.os }}-pnpm-store-sharp-${{ hashFiles('fe/pnpm-lock.yaml') }}
                    restore-keys: |
                        ${{ runner.os }}-pnpm-store-sharp-

            -   name: Install system dependencies for sharp
                run: |
                    sudo apt-get update
                    sudo apt-get install -y libvips-dev

            -   name: Install dependencies
                working-directory: fe
                run: pnpm install --frozen-lockfile

            -   name: Build
                working-directory: fe
                run: pnpm build

            -   name: Upload build artifacts
                uses: actions/upload-artifact@v4
                with:
                    name: frontend-dist
                    path: fe/dist
                    retention-days: 7

    # ============================================================================
    # Frontend E2E Tests - Runs in parallel with other frontend/backend jobs
    # ============================================================================
    frontend-e2e:
        needs: [ changes ]
        if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Setup pnpm
                uses: pnpm/action-setup@v6
                with:
                    version: 10.33.4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: '22'

            -   name: Cache pnpm store
                uses: actions/cache@v4
                with:
                    path: fe/.pnpm-store
                    key: ${{ runner.os }}-pnpm-store-${{ hashFiles('fe/pnpm-lock.yaml') }}
                    restore-keys: |
                        ${{ runner.os }}-pnpm-store-

            -   name: Install dependencies
                working-directory: fe
                run: pnpm install --frozen-lockfile

            -   name: Install Playwright Chromium
                working-directory: fe
                run: pnpm exec playwright install --with-deps chromium

            -   name: Start PostgreSQL
                run: |
                    docker run -d --name postgres \
                      -e POSTGRES_USER=postgres \
                      -e POSTGRES_PASSWORD=postgres \
                      -e POSTGRES_DB=rdata \
                      -p 5432:5432 \
                      postgres:18-alpine
                    for i in {1..30}; do
                      docker exec postgres pg_isready -U postgres && break
                      echo "Waiting for postgres..."
                      sleep 1
                    done

            -   name: Start Redis
                run: |
                    docker run -d --name redis \
                      -p 6379:6379 \
                      redis:8-alpine
                    for i in {1..30}; do
                      docker exec redis redis-cli ping && break
                      echo "Waiting for redis..."
                      sleep 1
                    done

            -   name: Install Rust (nightly)
                uses: dtolnay/rust-toolchain@master
                with:
                    toolchain: nightly

            -   name: Cache cargo registry + build
                uses: swatinem/rust-cache@v2
                with:
                    workspaces: .

            -   name: Cache cargo bin directory
                uses: actions/cache@v4
                with:
                    path: ~/.cargo/bin
                    key: ${{ runner.os }}-cargo-bin-${{ hashFiles('Cargo.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-cargo-bin-

            -   name: Install sqlx-cli
                run: |
                    if ! command -v sqlx &> /dev/null; then
                      cargo install sqlx-cli --no-default-features --features postgres --locked
                    fi

            -   name: Run migrations
                env:
                    DATABASE_URL: postgres://postgres:postgres@localhost:5432/rdata
                run: sqlx migrate run

            -   name: Build and start app
                env:
                    DATABASE_URL: postgres://postgres:postgres@localhost:5432/rdata
                    REDIS_URL: redis://localhost:6379
                    JWT_SECRET: development_secret_key
                    JWT_EXPIRATION: 86400
                    API_HOST: localhost
                    API_PORT: 8080
                    CORS_ORIGINS: '*'
                    API_ENABLE_DOCS: true
                    RUST_LOG: info
                run: |
                    cargo build --bin r_data_core
                    cargo run --bin r_data_core &
                    # Wait for app to be ready
                    for i in {1..60}; do
                      curl -sf http://localhost:8080/admin/api/v1/health && break
                      echo "Waiting for app..."
                      sleep 2
                    done

            -   name: Build and start frontend
                working-directory: fe
                env:
                    VITE_API_BASE_URL: http://localhost:8080
                    VITE_ADMIN_BASE_URL: http://localhost:5173
                run: |
                    pnpm build
                    pnpm exec vite preview --port 5173 --host 0.0.0.0 &
                    for i in {1..30}; do
                      curl -sf http://localhost:5173 && break
                      echo "Waiting for frontend..."
                      sleep 2
                    done

            -   name: Run Playwright tests
                working-directory: fe
                env:
                    E2E_BASE_URL: http://localhost:5173
                    E2E_API_BASE_URL: http://localhost:8080
                    # Redis runs as a docker container published on the runner's
                    # localhost (see "Start Redis"); the e2e rate-limit helper
                    # connects here to clear the per-IP login counter.
                    E2E_REDIS_HOST: localhost
                    E2E_REDIS_PORT: '6379'
                run: pnpm exec playwright test --config=e2e/playwright.config.ts

            -   name: Upload Playwright report
                uses: actions/upload-artifact@v4
                if: ${{ !cancelled() }}
                with:
                    name: playwright-report
                    path: fe/e2e/playwright-report
                    retention-days: 7

            -   name: Upload test results
                uses: actions/upload-artifact@v4
                if: ${{ !cancelled() }}
                with:
                    name: playwright-test-results
                    path: fe/e2e/test-results
                    retention-days: 7

    # ============================================================================
    # CI Gate - Passes when all applicable checks pass
    # ============================================================================
    ci-gate:
        needs:
            - changes
            - backend-clippy
            - backend-format
            - backend-audit
            - backend-tests
            - backend-build
            - backend-ts-bindings
            - frontend-lint
            - frontend-tests
            - frontend-audit
            - frontend-build
            - frontend-e2e
        if: ${{ always() }}
        runs-on: ubuntu-latest
        steps:
            -   name: Enforce all required jobs
                id: enforce
                env:
                    BACKEND_NEEDED: ${{ needs.changes.outputs.backend }}
                    FRONTEND_NEEDED: ${{ needs.changes.outputs.frontend }}
                    BACKEND_CLIPPY: ${{ needs.backend-clippy.result }}
                    BACKEND_FORMAT: ${{ needs.backend-format.result }}
                    BACKEND_AUDIT: ${{ needs.backend-audit.result }}
                    BACKEND_TESTS: ${{ needs.backend-tests.result }}
                    BACKEND_BUILD: ${{ needs.backend-build.result }}
                    BACKEND_TS_BINDINGS: ${{ needs.backend-ts-bindings.result }}
                    FRONTEND_LINT: ${{ needs.frontend-lint.result }}
                    FRONTEND_TESTS: ${{ needs.frontend-tests.result }}
                    FRONTEND_AUDIT: ${{ needs.frontend-audit.result }}
                    FRONTEND_BUILD: ${{ needs.frontend-build.result }}
                    FRONTEND_E2E: ${{ needs.frontend-e2e.result }}
                run: |
                    fail=0
                    require_success() {
                      local name="$1"; local result="$2"
                      if [[ "$result" != "success" ]]; then
                        echo "::error::Required job '$name' did not succeed (result=$result)"
                        fail=1
                      else
                        echo "✓ $name"
                      fi
                    }

                    if [[ "$BACKEND_NEEDED" == "true" ]]; then
                      require_success backend-clippy      "$BACKEND_CLIPPY"
                      require_success backend-format      "$BACKEND_FORMAT"
                      require_success backend-audit       "$BACKEND_AUDIT"
                      require_success backend-tests       "$BACKEND_TESTS"
                      require_success backend-build       "$BACKEND_BUILD"
                      require_success backend-ts-bindings "$BACKEND_TS_BINDINGS"
                    fi

                    if [[ "$FRONTEND_NEEDED" == "true" ]]; then
                      require_success frontend-lint  "$FRONTEND_LINT"
                      require_success frontend-tests "$FRONTEND_TESTS"
                      require_success frontend-audit "$FRONTEND_AUDIT"
                      require_success frontend-build "$FRONTEND_BUILD"
                    fi

                    if [[ "$BACKEND_NEEDED" == "true" || "$FRONTEND_NEEDED" == "true" ]]; then
                      require_success frontend-e2e "$FRONTEND_E2E"
                    else
                      echo "No backend or frontend changes detected - nothing to check"
                    fi

                    if [[ $fail -eq 1 ]]; then
                      echo "::error::CI gate failed"
                      exit 1
                    fi
                    echo "CI gate passed"

            # Dispatched runs (auto-PR gating): this run's check runs are NOT
            # linked to the PR merge box, so report the required `ci-gate` check
            # explicitly via a commit status. github.sha IS the dispatched PR head.
            -   name: Report ci-gate commit status (workflow_dispatch)
                if: ${{ always() && github.event_name == 'workflow_dispatch' }}
                env:
                    GH_TOKEN: ${{ github.token }}
                    ENFORCE_OUTCOME: ${{ steps.enforce.outcome }}
                run: |
                    if [[ "$ENFORCE_OUTCOME" == "success" ]]; then
                      state=success
                      description="All CI checks passed"
                    else
                      state=failure
                      description="CI checks failed"
                    fi
                    gh api "repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" \
                        -f state="$state" -f context=ci-gate \
                        -f description="$description" \
                        -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
                    echo "set ci-gate=$state on $GITHUB_SHA"
