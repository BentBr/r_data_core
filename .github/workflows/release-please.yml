name: Release Please

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write
    packages: write
    id-token: write
    statuses: write
    attestations: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
            version: ${{ steps.release.outputs.version }}
            prs_created: ${{ steps.release.outputs.prs_created }}
            prs: ${{ steps.release.outputs.prs }}
            pr_head_sha: ${{ steps.get-pr-sha.outputs.sha }}
        steps:
            -   name: Release Please
                id: release
                uses: googleapis/release-please-action@v4
                with:
                    token: ${{ secrets.GITHUB_TOKEN }}
                    config-file: release-please-config.json
                    manifest-file: .release-please-manifest.json

            -   name: Debug outputs
                env:
                    RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
                    VERSION: ${{ steps.release.outputs.version }}
                    TAG_NAME: ${{ steps.release.outputs.tag_name }}
                    PRS_CREATED: ${{ steps.release.outputs.prs_created }}
                    PRS_JSON: ${{ steps.release.outputs.prs }}
                run: |
                    echo "=== Release Outputs ==="
                    echo "release_created: $RELEASE_CREATED"
                    echo "version: $VERSION"
                    echo "tag_name: $TAG_NAME"
                    echo ""
                    echo "=== PR Tracking ==="
                    echo "PRs created: $PRS_CREATED"
                    echo "PRs: $PRS_JSON"

            -   name: Resolve release PR head needing CI
                id: get-pr-sha
                # Runs on every push-to-main release-please run (not only when the
                # PR was just created) so a PR left without a ci-gate status can
                # self-heal on a later push. Skipped when a release is being cut.
                if: ${{ steps.release.outputs.release_created != 'true' }}
                uses: actions/github-script@v7
                env:
                    PRS_OUTPUT: ${{ steps.release.outputs.prs }}
                with:
                    script: |
                        const { owner, repo } = context.repo;
                        const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

                        // Identify the open release-please PR: prefer this run's
                        // output; otherwise find the open PR on a release branch.
                        let prNumber = null;
                        const prsOutput = process.env.PRS_OUTPUT;
                        if (prsOutput) {
                          try {
                            const prs = JSON.parse(prsOutput);
                            if (Array.isArray(prs) && prs.length > 0) {
                              prNumber = prs[0].number;
                            }
                          } catch (e) {
                            core.info(`Could not parse PRS_OUTPUT: ${e.message}`);
                          }
                        }
                        if (!prNumber) {
                          const { data: open } = await github.rest.pulls.list({
                            owner, repo, state: 'open', per_page: 50,
                          });
                          const relPr = open.find((p) => p.head.ref.startsWith('release-please--'));
                          if (!relPr) {
                            core.info('No open release-please PR found; nothing to do.');
                            return;
                          }
                          prNumber = relPr.number;
                        }

                        const { data: pr } = await github.rest.pulls.get({
                          owner, repo, pull_number: prNumber,
                        });
                        const branch = pr.head.ref;

                        // release-please force-pushes the release branch, and the
                        // PR head field can lag (read-after-write). Resolve the
                        // branch ref directly and poll until two reads agree, so we
                        // never post ci-gate on a stale SHA.
                        let last = null;
                        let sha = null;
                        for (let i = 0; i < 8; i++) {
                          const { data: ref } = await github.rest.git.getRef({
                            owner, repo, ref: `heads/${branch}`,
                          });
                          const cur = ref.object.sha;
                          core.info(`poll ${i}: ${branch} -> ${cur}`);
                          if (cur === last) { sha = cur; break; }
                          last = cur;
                          await sleep(5000);
                        }
                        sha = sha || last;
                        if (!sha) {
                          core.info('Could not resolve branch head SHA.');
                          return;
                        }

                        // Self-heal guard: only (re)run CI when the current head
                        // lacks a successful ci-gate status, so routine main pushes
                        // do not redundantly re-run CI on an already-green head.
                        const { data: combined } = await github.rest.repos.getCombinedStatus({
                          owner, repo, ref: sha,
                        });
                        const gate = combined.statuses.find((s) => s.context === 'ci-gate');
                        if (gate && gate.state === 'success') {
                          core.info(`ci-gate already success on ${sha}; nothing to do.`);
                          return;
                        }

                        core.setOutput('sha', sha);
                        core.info(`PR #${prNumber} (${branch}) head ${sha} needs ci-gate (current: ${gate ? gate.state : 'none'}).`);

    # Run CI for release-please PRs (GITHUB_TOKEN events don't trigger other workflows)
    ci-for-release-pr:
        needs: release-please
        if: ${{ needs.release-please.outputs.pr_head_sha != '' && needs.release-please.outputs.release_created != 'true' }}
        uses: ./.github/workflows/ci.yml

    # Report CI status to the PR (called workflows don't create status checks)
    report-ci-status:
        needs: [ release-please, ci-for-release-pr ]
        if: ${{ always() && needs.release-please.outputs.pr_head_sha != '' && needs.release-please.outputs.release_created != 'true' }}
        runs-on: ubuntu-latest
        steps:
            -   name: Report CI status to PR
                uses: actions/github-script@v7
                with:
                    script: |
                        const sha = '${{ needs.release-please.outputs.pr_head_sha }}';
                        const ciResult = '${{ needs.ci-for-release-pr.result }}';

                        if (!sha) {
                          console.log('No SHA available, skipping status update');
                          return;
                        }

                        const state = ciResult === 'success' ? 'success' :
                                      ciResult === 'failure' ? 'failure' :
                                      ciResult === 'cancelled' ? 'error' : 'pending';

                        const description = ciResult === 'success' ? 'All CI checks passed' :
                                           ciResult === 'failure' ? 'CI checks failed' :
                                           ciResult === 'cancelled' ? 'CI was cancelled' : 'CI is running';

                        await github.rest.repos.createCommitStatus({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          sha: sha,
                          state: state,
                          context: 'ci-gate',
                          description: description,
                          target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                        });

                        console.log(`Set commit status for ${sha}: ${state}`);

    # Build and publish Docker images when a release is created
    docker-publish:
        needs: release-please
        if: ${{ needs.release-please.outputs.release_created == 'true' }}
        uses: ./.github/workflows/docker-publish.yml
        with:
            version: ${{ needs.release-please.outputs.version }}
            tag_name: ${{ needs.release-please.outputs.tag_name }}
            build_backend: true
            build_frontend: true
        secrets: inherit
