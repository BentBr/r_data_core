name: 'PR management'

# On push to a feature branch, open (or refresh) a draft PR to main with a
# title + changelog derived from the branch's conventional commits, and apply
# one label per commit type present. release-please owns its own PR, so its
# branches are excluded.

on:
    push:
        branches-ignore:
            - main
            - develop
            - 'release-please--**'

    workflow_dispatch:
        inputs:
            target_branch:
                description: 'Run for this branch name (e.g. feat/my-branch)'
                required: true
                type: string

jobs:
    prettify-pr:
        name: 'Prettify PR'
        permissions:
            contents: read
            pull-requests: write
        runs-on: ubuntu-latest
        env:
            BASE_BRANCH: 'main'
            # Conventional-commit types recognised for title stripping,
            # changelog grouping and labelling.
            COMMIT_TYPES: 'feat fix docs style refactor perf test build ci chore'
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Resolve branch name
                env:
                    EVENT_NAME: ${{ github.event_name }}
                    TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
                run: |
                    set -Eeuo pipefail
                    if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
                        BRANCH="$TARGET_BRANCH"
                        if [[ -z "$BRANCH" ]]; then
                            echo "target_branch input is empty" >&2
                            exit 1
                        fi
                    else
                        BRANCH="${GITHUB_REF#refs/heads/}"
                    fi
                    echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
                    echo "Resolved BRANCH=$BRANCH"

                    if [[ "$BRANCH" == release-please--* ]]; then
                        echo "Branch is owned by release-please; nothing to do."
                        echo "SKIP=true" >> "$GITHUB_ENV"
                    fi

            -   name: Ensure branch exists on remote
                if: env.SKIP != 'true' && github.event_name == 'workflow_dispatch'
                uses: actions/github-script@v7
                env:
                    BRANCH: ${{ env.BRANCH }}
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    script: |
                        const { owner, repo } = context.repo;
                        const branch = (process.env.BRANCH || '').trim();
                        try {
                            await github.rest.repos.getBranch({ owner, repo, branch });
                            core.info(`Branch '${branch}' exists on remote.`);
                        } catch (e) {
                            core.setFailed(`Branch '${branch}' not found on remote: ${e.message}`);
                        }

            -   name: Resolve PR title
                if: env.SKIP != 'true'
                env:
                    COMMIT_TYPES: ${{ env.COMMIT_TYPES }}
                run: |
                    set -Eeuo pipefail

                    slug="$BRANCH"
                    for type in $COMMIT_TYPES; do
                        if [[ "$slug" =~ ^(${type})([/-])(.*)$ ]]; then
                            slug="${BASH_REMATCH[3]}"
                            break
                        fi
                    done

                    slug="${slug//\//-}"

                    lc="$(echo "$slug" | tr '[:upper:]' '[:lower:]' | tr '_-' '  ' | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//')"
                    if [[ -n "$lc" ]]; then
                        title="$(printf '%s%s' "${lc:0:1}" "${lc:1}")"
                        title="${title^}"
                    else
                        title="$BRANCH"
                    fi

                    echo "PR_TITLE=$title" >> "$GITHUB_ENV"
                    echo "Generated PR title: $title"

            -   name: Resolve PR body and labels from commits
                if: env.SKIP != 'true'
                env:
                    BASE_BRANCH: ${{ env.BASE_BRANCH }}
                run: |
                    set -Eeuo pipefail
                    printf -v NL '\n'

                    declare -A TYPE_LABELS=(
                        ["feat"]="Features"
                        ["fix"]="Bug Fixes"
                        ["docs"]="Documentation"
                        ["style"]="Styles"
                        ["refactor"]="Code Refactoring"
                        ["perf"]="Performance Improvements"
                        ["test"]="Tests"
                        ["build"]="Build System"
                        ["ci"]="Continuous Integration"
                        ["chore"]="Chores"
                    )
                    TYPE_ORDER="feat fix docs style refactor perf test build ci chore"

                    declare -A GROUPED_COMMITS
                    declare -A SEEN_TYPES
                    BREAKING="false"

                    MERGE_BASE=$(git merge-base "origin/${BASE_BRANCH}" HEAD 2>/dev/null || echo "")
                    COMMENT="🔀 PR to \`${BASE_BRANCH}\` from \`${BRANCH}\`"

                    if [[ -n "$MERGE_BASE" ]]; then
                        while IFS= read -r line; do
                            [[ -z "$line" ]] && continue
                            msg="${line#* }"
                            # Skip merge commits.
                            if [[ "$msg" =~ ^Merge\ (branch|pull\ request) ]]; then
                                continue
                            fi
                            if [[ "$msg" =~ ^([a-z]+)(\(.+\))?(!)?:\ (.+)$ ]]; then
                                type="${BASH_REMATCH[1]}"
                                bang="${BASH_REMATCH[3]}"
                                desc="${BASH_REMATCH[4]}"
                                if [[ -n "${TYPE_LABELS[$type]:-}" ]]; then
                                    GROUPED_COMMITS[$type]+="* ${desc}${NL}"
                                    SEEN_TYPES[$type]=1
                                fi
                                if [[ -n "$bang" ]]; then
                                    BREAKING="true"
                                fi
                            fi
                        done < <(git log --format='%H %s' "${MERGE_BASE}..HEAD" 2>/dev/null | head -100)

                        # Detect BREAKING CHANGE footers across full commit bodies.
                        if git log --format='%B' "${MERGE_BASE}..HEAD" 2>/dev/null | grep -q 'BREAKING CHANGE'; then
                            BREAKING="true"
                        fi

                        CHANGES=""
                        for type in $TYPE_ORDER; do
                            if [[ -n "${GROUPED_COMMITS[$type]:-}" ]]; then
                                CHANGES+="**${TYPE_LABELS[$type]}**${NL}"
                                CHANGES+="${GROUPED_COMMITS[$type]}${NL}"
                            fi
                        done

                        if [[ -n "$CHANGES" ]]; then
                            COMMENT="${COMMENT}${NL}${NL}---${NL}${NL}${CHANGES%${NL}}"
                        fi
                    fi

                    # Labels: one per commit type present, plus breaking-change.
                    LABELS=()
                    for type in $TYPE_ORDER; do
                        if [[ -n "${SEEN_TYPES[$type]:-}" ]]; then
                            LABELS+=("$type")
                        fi
                    done
                    if [[ "$BREAKING" == "true" ]]; then
                        LABELS+=("breaking-change")
                    fi
                    LABELS_STRING=$(IFS=, ; echo "${LABELS[*]}")

                    echo "Resolved labels: $LABELS_STRING"
                    echo "PR_LABELS=$LABELS_STRING" >> "$GITHUB_ENV"

                    {
                        echo "PR_BODY<<__PR_BODY_EOF__"
                        echo "$COMMENT"
                        echo "__PR_BODY_EOF__"
                    } >> "$GITHUB_ENV"

            -   name: Create or update draft PR
                if: env.SKIP != 'true'
                uses: actions/github-script@v7
                env:
                    BRANCH: ${{ env.BRANCH }}
                    BASE_BRANCH: ${{ env.BASE_BRANCH }}
                    PR_TITLE: ${{ env.PR_TITLE }}
                    PR_BODY: ${{ env.PR_BODY }}
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    script: |
                        const { owner, repo } = context.repo;
                        const head = process.env.BRANCH;
                        const base = process.env.BASE_BRANCH;
                        const title = process.env.PR_TITLE;
                        const body = process.env.PR_BODY;

                        const { data: open } = await github.rest.pulls.list({
                            owner, repo, state: 'open', head: `${owner}:${head}`, per_page: 10
                        });

                        let pr;
                        if (open.length > 0) {
                            pr = open[0];
                            if (pr.base.ref !== base) {
                                core.info(`Open PR #${pr.number} targets ${pr.base.ref}, not ${base} — leaving as-is.`);
                            } else {
                                await github.rest.pulls.update({ owner, repo, pull_number: pr.number, title, body });
                                core.info(`Updated PR #${pr.number}`);
                            }
                        } else {
                            const { data: newPR } = await github.rest.pulls.create({
                                owner, repo, head, base, title, body, draft: true
                            });
                            pr = newPR;
                            core.info(`Created draft PR #${pr.number}`);

                            // Assign the pusher when the PR was opened by the action.
                            const opener = (context.payload.sender && context.payload.sender.login) || '';
                            if (opener && !opener.endsWith('[bot]')) {
                                try {
                                    await github.rest.issues.addAssignees({
                                        owner, repo, issue_number: pr.number, assignees: [opener]
                                    });
                                } catch (e) {
                                    core.warning(`Cannot assign ${opener}: ${e.message}`);
                                }
                            }
                        }

                        core.exportVariable('PR_NUMBER', String(pr.number));

            -   name: Apply commit-type labels
                if: env.SKIP != 'true' && env.PR_NUMBER
                uses: actions/github-script@v7
                env:
                    PR_NUMBER: ${{ env.PR_NUMBER }}
                    PR_LABELS: ${{ env.PR_LABELS }}
                    COMMIT_TYPES: ${{ env.COMMIT_TYPES }}
                with:
                    github-token: ${{ secrets.GITHUB_TOKEN }}
                    script: |
                        const { owner, repo } = context.repo;
                        const issue_number = Number(process.env.PR_NUMBER);

                        const typeLabels = new Set(
                            (process.env.COMMIT_TYPES || '').split(/\s+/).map(s => s.trim()).filter(Boolean)
                        );
                        typeLabels.add('breaking-change');

                        const wanted = (process.env.PR_LABELS || '')
                            .split(',').map(s => s.trim()).filter(Boolean);

                        const { data: existing } = await github.rest.issues.listLabelsOnIssue({
                            owner, repo, issue_number, per_page: 100
                        });

                        // Preserve any label we don't manage (manually added, GitHub defaults…).
                        const preserved = existing.map(l => l.name).filter(n => !typeLabels.has(n));

                        const labels = [...new Set([...wanted, ...preserved])];
                        if (labels.length === 0) {
                            core.info('No labels to apply.');
                            return;
                        }

                        await github.rest.issues.setLabels({ owner, repo, issue_number, labels });
                        core.info(`Applied labels: ${labels.join(', ')}`);
